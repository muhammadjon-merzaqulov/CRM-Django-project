<nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <button id="mobile-sidebar-button" class="md:hidden mr-2 text-gray-500 hover:text-gray-700">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex-shrink-0 flex items-center">
                    <a href="{% url 'dashboard' %}" class="text-xl font-bold text-blue-600">CRM System</a>
                </div>
            </div>
            <div class="flex items-center">
                <div class="ml-3 relative">
                    <div>
                        <button type="button" class="flex text-sm rounded-full focus:outline-none" id="user-menu-button" aria-expanded="false" aria-haspopup="true">
                            <span class="sr-only">Open user menu</span>
                            {% if user.profile.profile_image %}
                                <img class="h-8 w-8 rounded-full object-cover" src="{{ user.profile.profile_image.url }}" alt="{{ user.username }}">
                            {% else %}
                                <div class="h-8 w-8 rounded-full bg-blue-500 flex items-center justify-center text-white">
                                    {{ user.username|first|upper }}
                                </div>
                            {% endif %}
                            <span class="ml-2 text-gray-700 hidden sm:block">{{ user.username }}</span>
                        </button>
                    </div>
                    <div class="hidden origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg py-1 bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-50" role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" tabindex="-1" id="user-menu">
                        <a href="{% url 'profile' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Your Profile</a>
                        <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Sign out</a>
